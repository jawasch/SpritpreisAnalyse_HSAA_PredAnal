services:
  # Backend API — serves from joblib models + parquet files (no database needed)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spritpreis_backend
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Override .env value — in Docker the raw data is mounted at this path
      TANKERKOENIG_DATA_PATH: /app/data/tankerkoenig-data
      # Auto-build missing data files (EDA summary, oil prices, recent station prices)
      # on every container start. Only builds what's missing — safe to leave on.
      RUN_SETUP_ON_START: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./notebooks:/app/notebooks:ro
      - ./scripts:/app/scripts:ro
      - ../tankerkoenig-data:/app/data/tankerkoenig-data:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spritpreis_frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  frontend_node_modules:
