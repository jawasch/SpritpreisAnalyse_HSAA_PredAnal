services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: spritpreis_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spritpreis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spritpreis123}
      POSTGRES_DB: ${POSTGRES_DB:-spritpreis_analytics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spritpreis} -d ${POSTGRES_DB:-spritpreis_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spritpreis_backend
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Override .env value — in Docker the raw data is mounted at this path
      TANKERKOENIG_DATA_PATH: /app/data/tankerkoenig-data
      # Auto-build missing data files (EDA summary, oil prices, recent station prices)
      # on every container start. Only builds what's missing — safe to leave on.
      RUN_SETUP_ON_START: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./notebooks:/app/notebooks:ro
      - ./scripts:/app/scripts:ro
      - ../tankerkoenig-data:/app/data/tankerkoenig-data:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spritpreis_frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      # Frontend → backend base URL. Empty = use the internal /api proxy (same-origin, no CORS).
      # Set BACKEND_URL in .env to the backend subdomain for cross-origin deployment.
      VITE_API_URL: ${BACKEND_URL:-}
      # Host headers the Vite dev server accepts (production: ".jannis-schuler.de,localhost").
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  frontend_node_modules:
